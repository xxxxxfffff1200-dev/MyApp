name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build APK (Buildozer Action)
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_version: stable
          workdir: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
